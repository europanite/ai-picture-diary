name: Pages

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to checkout"
        required: false
        type: string
        default: "main"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || 'main' }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Show latest.json
        run: |
          set -euo pipefail
          echo "===== frontend/app/public/latest.json ====="
          cat frontend/app/public/latest.json

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/app/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/app
        run: |
          set -euo pipefail
          npm ci

      - name: Export frontend web build
        working-directory: frontend/app
        env:
          CI: "1"
          EXPO_NO_TELEMETRY: "1"
          EXPO_PUBLIC_FEED_URL: "./feed/index.json"
        run: |
          set -euo pipefail
          npx expo export --platform web --output-dir web-build

      - name: Merge public resources into web build
        run: |
          set -euo pipefail
          mkdir -p frontend/app/web-build
          cp -a frontend/app/public/. frontend/app/web-build/
          touch frontend/app/web-build/.nojekyll

      - name: Verify deployed resources
        run: |
          set -euo pipefail
          echo "=== public ==="
          find frontend/app/public -maxdepth 3 -type f | sort
          echo "=== web-build ==="
          find frontend/app/web-build -maxdepth 3 -type f | sort

          test -f frontend/app/public/latest.json
          test -f frontend/app/web-build/latest.json

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/app/web-build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5